<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sort and Filter</title>
    <link rel="stylesheet" href="sortfilter.css">
    <script src="sortfilter.js" defer></script>
</head>
<body>
    <h1>There is a secret on this page. Let me know if you find it. (hint: Ctrl + a)</h1>
    <label for="search">Enter Search</label>
    <input id="search" type="text">
    <button>Search</button>
    <div id="hike-container">
      <div class="hike-card">
        <div class="hike-content">
          <h2>Teton Canyon</h2>
          <div class="hike-tags">
            <button>Canyon</button>
            <button>Tetons</button>
          </div>
          <p>Beautiful short (or long) hike through Teton Canyon.</p>
          <p><span class="rating" role="img" aria-label="1 out of 5">🥾▫️▫️▫️▫️</span></p>
        </div>
      </div>
    </div>                
    <footer>
        <p>If you find this hi.</p>
    </footer>
</body>
</html>
