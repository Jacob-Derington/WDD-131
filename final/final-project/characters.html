<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="characters.css">
    <script src="characters.js" defer></script>
</head>
<body onload="loadCharacters()">
    <header>
    <img src="logo.png" alt="Character Creator Logo" width="175">
        <nav>
            <a href="final.html" class="nav-btn">Home</a>
            <a href="characters.html" class="nav-btn">Character Library</a>
            <a href="#about" class="nav-btn">About</a>
        </nav>
    </header>

    <main>
        <input type="text" id="searchInput" placeholder="Search characters by name...">

        <div class="flex-container">
            <div id="characterList"></div>
            <div id="details">
                <p>Select a character to view details</p>
            </div>
        </div>

        <hr>

        <section id="about">
            <h2>About</h2>
            <p>
                This website allows users to create and manage unique characters for storytelling, gaming,
                and creative projects. Characters are saved using localStorage so users can return and
                continue working at any time.
            </p>
        </section>
    </main>
    <footer>©2026 Derington</footer>
</body>
</html>
