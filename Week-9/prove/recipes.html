<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>recipe</title>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="recipes.css">
    
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
                    
</head>
<body>
    <header>
        <div class="logo-title"> <img src="images/images/recipe-book.png" alt="Recipe Book Logo"> <h1>Recipe Book</h1> </div>

        <div class="search"> 
            <input type="text" placeholder="Search recipes"> 
            <button> <img src="images/images/search.svg" alt="search"> </button> 
        </div>
    </header>

    <main>
        <article class="recipe"> 
            <img src="images/images/apple-crisp.jpg" alt="Apple Crisp"> 
            <div class="recipe-info"> 
                <span class="tag">dessert</span>
                <h2>Apple Crisp</h2> 
                <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars" > 
                    <span aria-hidden="true">⭐</span> 
                    <span aria-hidden="true">⭐</span> 
                    <span aria-hidden="true">⭐</span> 
                    <span aria-hidden="true">⭐</span> 
                    <span aria-hidden="true">☆</span> 
                </span>

                <p class="description">This apple crisp resipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream</p> 
            </div> 
        </article>
    </main>

    <footer> 
        <div class="social"> <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates --> 
            <a href="#"><img src="images/images/instagram_icon.svg" alt="instagram icon"></a> 
            <a href="#"><img src="images/images/youtube_icon.svg" alt="youtube icon"></a> 
            <a href="#"><img src="images/images/pinterest_icon.svg" alt="pinterest icon"></a> 
        </div> 
        <p> 
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons"> Recipe icons created by Freepik - Flaticon </a> 
        </p> 
    </footer>
</body>
</html>
